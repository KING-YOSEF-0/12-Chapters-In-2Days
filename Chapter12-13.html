<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var character = prompt("Enter a character:");
        var asciiCode = character.charCodeAt(0);
        if (asciiCode >= 65 && asciiCode <= 90) {
            alert(character + " is an uppercase letter.");
        } else if (asciiCode >= 97 && asciiCode <= 122) {
            alert(character + " is a lowercase letter.");
        } else if (asciiCode >= 48 && asciiCode <= 57) {
            alert(character + " is a digit.");
        } else {
            alert(character + " is a special character.");
        }
    </script>

    <script>
        var num1 = parseFloat(prompt("Enter the first number:"));
        var num2 = parseFloat(prompt("Enter the second number:"));
        if (num1 > num2) {
            alert(num1 + " is larger than " + num2);
        } else if (num2 > num1) {
            alert(num2 + " is larger than " + num1);
        } else {
            alert("Both numbers are equal.");
        }
    </script>

    <script>
        var number = parseFloat(prompt("Enter a number:"));
        if (number > 0) {
            alert(number + " is a positive number.");
        } else if (number < 0) {
            alert(number + " is a negative number.");
        } else {
            alert("The number is zero.");
        }
    </script>

    <script>
        var character = prompt("Enter a character:");
        var vowels = ['a', 'e', 'i', 'o', 'u'];
        if (vowels.includes(character.toLowerCase())) {
            alert(character + " is a vowel.");
        } else {
            alert(character + " is not a vowel.");
        }
    </script> 

    <script>
        var password = "myPassword123";
        var userInput = prompt("Enter your password:");
        if (userInput === "") {
            alert("Please enter your password.");
        } else if (userInput === password) {
            alert("Correct! The password you entered matches the original password.");
        } else {
            alert("Incorrect password.");
        }
    </script>

    <script>
        var greeting;
        var hour = 13;
        if (hour < 18) {
            greeting = "Good day";
        } else {
            greeting = "Good evening";
        }
        alert(greeting);
    </script>

    <script>
        var time = parseInt(prompt("Enter the time in 24-hour format (e.g., 1900 for 7 PM):"));
        if (time >= 0 && time < 1200) {
            alert("Good morning!");
        } else if (time >= 1200 && time < 1700) {
            alert("Good afternoon!");
        } else if (time >= 1700 && time < 2100) {
            alert("Good evening!");
        } else if (time >= 2100 && time <= 2359) {
            alert("Good night!");
        } else {
            alert("Invalid time entered.");
        }
    </script>
</body>
</html>
